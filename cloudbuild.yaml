steps:
  # 1. Build imagen Docker
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - build
      - -t
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/rag:$COMMIT_SHA'
      - -t
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/rag:latest'
      - .
    id: build

  # 2. Push a Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - push
      - '--all-tags'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/rag'
    id: push
    waitFor: ['build']

  # 3. Deploy Cloud Run Service (RAG API)
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    args:
      - run
      - deploy
      - minddash-rag
      - '--image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/rag:$COMMIT_SHA'
      - '--region=${_REGION}'
      - '--project=$PROJECT_ID'
      - '--service-account=minddash-rag-sa@$PROJECT_ID.iam.gserviceaccount.com'
    id: deploy-service
    waitFor: ['push']

  # 4. Build y push imagen del Job de ingestion (mismo repo, Dockerfile diferente)
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - build
      - -f
      - Dockerfile.ingestion
      - -t
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/rag-ingestion:$COMMIT_SHA'
      - -t
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/rag-ingestion:latest'
      - .
    id: build-ingestion
    waitFor: ['push']

  # 5. Push imagen de ingestion
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - push
      - '--all-tags'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/rag-ingestion'
    id: push-ingestion
    waitFor: ['build-ingestion']

  # 6. Actualizar Cloud Run Job con la nueva imagen
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: bash
    args:
      - -c
      - |
        gcloud run jobs update minddash-rag-ingestion \
          --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/rag-ingestion:$COMMIT_SHA \
          --region=${_REGION} \
          --project=$PROJECT_ID 2>/dev/null || \
        echo "Job no encontrado, se creara en el proximo terraform apply"
    id: deploy-job
    waitFor: ['push-ingestion']

substitutions:
  _REGION: us-central1
  _REPO: minddash-repo

options:
  logging: CLOUD_LOGGING_ONLY

timeout: 1800s
